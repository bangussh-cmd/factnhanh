    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

        }
        .container {
            position: relative; z-index: 3; height: 100%;

            padding: 20px; text-align: center;
        }
        .fact-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px 20px; border-radius: 24px;
            max-width: 600px; width: 100%; color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }
        
        /* Hàng tiêu đề thông minh: Tự chia không gian trên cả Máy tính lẫn Điện thoại */
        .action-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        .action-header h2 { 
            font-size: 1.15rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #ffd700; 
            margin: 0;
            text-align: left;
            font-weight: bold;
        }
        .buttons-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 6px 12px; font-size: 0.85rem; border-radius: 20px; cursor: pointer; transition: 0.2s;
            white-space: nowrap;
        }
        .lang-btn:hover { background: rgba(255, 255, 255, 0.4); }
        
        .heart-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; width: 32px; height: 32px; font-size: 1rem; border-radius: 50%; cursor: pointer;

        }
        .heart-btn.liked { background: rgba(233, 30, 99, 0.2); border-color: #e91e63; color: #ff4081; transform: scale(1.1); }
        
        .fact-box p { font-size: 1.15rem; line-height: 1.6; min-height: 140px; display: flex; align-items: center; justify-content: center; }
        
        .next-btn {
            background: #00bcd4; color: white; border: none; padding: 16px 40px; font-size: 1.1rem; font-weight: bold;

    <script>
        let audioCtx = null;
        function initAudio() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return false;
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return true;
            } catch (e) { return false; }
        }
        function startApp() {
            document.getElementById('audio-unlock-overlay').style.display = 'none';
            getRandomFact();
            if (initAudio()) setTimeout(() => { playBeep('ting'); }, 100);
        }
        function playBeep(type) {
            try {
                if (!initAudio() || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'pop') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                    gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'ting') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(900, now + 0.1);
                    gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'like') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(500, now); osc.frequency.setValueAtTime(800, now + 0.06);
                    gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                }
            } catch (e) {}
        }

            { id: 31, vi: "Trò chơi điện tử huyền thoại Pac-Man ban đầu được lấy cảm hứng từ hình dáng của một chiếc bánh Pizza bị khuyết mất đúng một miếng khi tác giả đang ngồi ăn trưa.", en: "The iconic character Pac-Man was inspired by a pizza with a single slice missing while the creator was having lunch.", image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" },
            { id: 32, vi: "Trước khi trở thành ngôi sao điện ảnh toàn cầu giàu có, tài tử Hugh Jackman (Wolverine của X-Men) từng làm công việc hoạt náo viên chú hề tại các bữa tiệc sinh nhật cho trẻ em với mức thù lao rất rẻ.", en: "Before finding global fame, Wolverine star Hugh Jackman used to work as a professional party clown for kids' birthdays!", image: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=800" },
            { id: 33, vi: "Bộ phim đầu tiên được tải lên nền tảng YouTube có tên là 'Me at the zoo' (Tôi ở sở thú) vào ngày 23/04/2005. Video này chỉ dài vỏn vẹn 19 giây và do chính người đồng sáng lập YouTube đăng tải.", en: "The very first video uploaded to YouTube is called 'Me at the zoo' on April 23, 2005. It is only 19 seconds long!", image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800" },
            { id: 34, vi: "Nữ diễn viên danh giá Gal Gadot từng tự mình thực hiện rất nhiều cảnh hành động nguy hiểm trong bộ phim bom tấn Wonder Woman khi cô đang mang thai ở tháng thứ 5! Đúng là Wonder Woman ngoài đời thực!", en: "Gal Gadot performed reshoots for Wonder Woman while she was 5 months pregnant! Talk about a real-life superhero action!", image: "https://images.unsplash.com/photo-1568602445839-23415e723553?w=800" },
            { id: 35, vi: "Loài mèo nhà bé nhỏ dành tới hơn 70% cuộc đời của chúng chỉ để làm một việc duy nhất: Đi ngủ. Đúng là một cuộc sống thiên đường mà ai trong chúng ta cũng thầm ao ước đúng không?", en: "House cats spend roughly 70% of their entire lives sleeping. Talk about living the absolute dream life every single day!", image: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=800" },
            { id: 36, vi: "Vào năm 1999, công ty tìm kiếm khổng lồ Google từng cố gắng bán mình cho cổng thông tin Excite với giá chỉ 750.000 USD nhưng đã bị từ chối thẳng thừng. Giờ Excite chắc đang tiếc hùi hụi luôn!", en: "In 1999, Google's founders tried to sell the company to Excite for just $750,000, but Excite's CEO turned them down!", image: "https://images.unsplash.com/photo-1573804633927-bfcbcd909acd?w=800" },
            { id: 37, vi: "Tại vương quốc Anh, tất cả những chú thiên nga hoang dã bơi trên các dòng sông công cộng đều thuộc quyền sở hữu hợp pháp của Nữ hoàng (hoặc Nhà vua). Bạn mà làm đau chúng là rắc rối lớn đấy!", en: "All wild swans in the UK technically belong to the British Monarch. Harming one can lead to surprisingly severe legal penalties!", image: "https://images.unsplash.com/photo-1527842746016-582387de5b52?w=800" },
            { id: 38, vi: "Người đầu tiên trên thế giới sở hữu khối tài sản chạm mốc 1 tỷ USD là ông vua dầu mỏ John D. Rockefeller vào năm 1916. Số tiền đó tương đương hàng trăm tỷ USD ở thời điểm hiện tại.", en: "John D. Rockefeller became the world's first confirmed billionaire in 1916. His wealth was legendary in modern standards!", image: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=800" },
            { id: 39, vi: "Món đồ chơi khối lập phương Rubik nổi tiếng ban đầu được tác giả Erno Rubik mất tới hơn 1 tháng trời liên tục ròng rã chỉ để tự mình tìm ra cách giải sau khi phát minh ra nó!", en: "The inventor of the Rubik's Cube, Erno Rubik, took over a month to solve his own puzzle for the very first time after making it!", image: "https://images.unsplash.com/photo-1591714815144-246c1e1ed207?w=800" },
            { id: 40, vi: "Công ty sản xuất trò chơi Nintendo (Nhật Bản) đình đám ngày nay thực chất đã được thành lập từ năm 1889! Công việc ban đầu của họ suốt nhiều thập kỷ là sản xuất... các bộ bài lá thủ công.", en: "Nintendo was founded way back in 1889! For its first few decades, the company manufactured handmade playing cards instead of video games.", image: "https://images.unsplash.com/photo-1566577134770-3d85bb3a9cc4?w=800" },
            { id: 41, vi: "Bộ phim kinh dị kinh điển 'The Conjuring' dựa trên câu chuyện có thật của gia đình Perron. Nhưng điều đáng sợ hơn là trong quá trình quay phim, hàng loạt hiện tượng kỳ bí không lời giải thích đã xảy ra khiến cả đoàn làm phim và các diễn viên phải hoảng sợ! Bạn có dám xem lại bộ phim này một mình không?", en: "The horror movie 'The Conjuring' is based on a true story. Eerily, during filming, multiple unexplained events happened on set, terrifying the cast and crew!", image: "https://images.unsplash.com/photo-1505635552518-3448ff116af3?w=800" },
            { id: 42, vi: "Bộ ba phim bom tấn huyền thoại 'Chúa tể những chiếc nhẫn' (The Lord of the Rings) đã gom về tổng cộng tới 17 giải Oscar. Đây là một kỷ lục vô tiền khoáng hậu trong lịch sử điện ảnh thế giới dành cho một loạt phim giả tưởng!", en: "The Lord of the Rings trilogy won a staggering total of 17 Academy Awards, setting a historic record for any fantasy film franchise!", image: "https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=800" },
            { id: 43, vi: "Bộ phim Avatar (2009) của đạo diễn James Cameron đã tạo ra hẳn một ngôn ngữ hoàn chỉnh mang tên Na'vi với hơn 1.000 từ vựng thực tế và ngữ pháp riêng biệt để các diễn viên học và đối thoại. Thật sự là một sự đầu tư quá khủng khiếp!", en: "The movie Avatar (2009) created a fully functional Na'vi language from scratch with over 1,000 words and strict grammar rules for the cast to learn!", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800" },
            { id: 44, vi: "Để hóa thân xuất sắc vào vai diễn Joker huyền thoại, nam diễn viên quá cố Heath Ledger đã tự nhốt mình cô độc trong một căn phòng khách sạn suốt một tháng trời để luyện tập điệu cười điên dại khét tiếng. Nghệ thuật đích thực là đây!", en: "To prepare for his legendary role as the Joker, Heath Ledger locked himself in a hotel room for a month to perfect the character's iconic, chilling laugh.", image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=800" },
            { id: 45, vi: "Bài hát 'Baby Shark' quen thuộc của trẻ em thực chất đã trở thành video đầu tiên trong lịch sử nhân loại vượt qua cột mốc kinh hoàng: 10 tỷ lượt xem trên YouTube! Bạn có đóng góp lượt xem nào cho chú cá mập này không?", en: "The children's song 'Baby Shark' became the first video in human history to surpass a mind-boggling 10 billion views on YouTube!", image: "https://images.unsplash.com/photo-1551244072-5d12893278ab?w=800" },
            { id: 46, vi: "Katy Perry từng sở hữu một chú mèo cưng và cô đã đặt cho nó một cái tên siêu hài hước và độc lạ: 'Kitty Purry'. Đúng là chủ nào tớ nấy, lầy lội y chang nhau luôn!", en: "Pop star Katy Perry once owned a pet cat and gave it a hilariously punny name: 'Kitty Purry'. Truly matching her fun personality!", image: "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=800" },
            { id: 47, vi: "Nữ ca sĩ Taylor Swift nổi tiếng yêu mèo đến mức cô đã mua bảo hiểm cho đôi chân dài đắt giá của mình với số tiền bảo hiểm lên tới... 40 triệu USD! Nếu đôi chân ấy có vết xước, đó sẽ là một thảm họa tài chính.", en: "Pop icon Taylor Swift reportedly insured her famous legs for a jaw-dropping $40 million before going on a world tour!", image: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=800" },
            { id: 48, vi: "Leonardo DiCaprio nổi tiếng với khả năng diễn xuất đỉnh cao, nhưng bạn biết không? Trong cảnh phim quay ở bàn ăn của bộ phim 'Django Unchained', anh đã vô tình đập tay làm vỡ một chiếc cốc thủy tinh thật, máu chảy đầm đìa nhưng vẫn tiếp tục diễn không hề ngừng lại!", en: "In Django Unchained, Leonardo DiCaprio accidentally smashed his hand on a glass, bleeding heavily, but ignored it and kept acting!", image: "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=800" },
            { id: 49, vi: "Biểu tượng nhạc Pop Michael Jackson từng cố gắng mua lại hãng phim Marvel vào những năm 1990 chỉ vì một lý do cực kỳ dễ thương: Ông muốn tự mình đóng vai chính Spider-Man (Người Nhện) trong phim!", en: "Pop legend Michael Jackson tried to buy Marvel Comics in the 1990s because he passionately wanted to star as Spider-Man himself!", image: "https://images.unsplash.com/photo-1635805737707-575885ab0820?w=800" },
            { id: 50, vi: "Ban nhạc huyền thoại The Beatles thực chất không một ai trong số 4 thành viên biết đọc hay biết viết nhạc lý theo các nốt nhạc tiêu chuẩn! Họ sáng tác hoàn toàn bằng tai và bằng cảm âm tự nhiên thuần túy.", en: "None of the members of the legendary band The Beatles could actually read or write traditional sheet music! They composed entirely by ear.", image: "https://images.unsplash.com/photo-1511192336575-5a79af67a629?w=800" },
            { id: 51, vi: "Hãng phim hoạt hình Pixar có một truyền thú vị: Họ luôn giấu mật mã 'A113' trong hầu hết tất cả các bộ phim của mình (Toy Story, Cars, Finding Nemo...). Đó thực ra là số phòng học đồ họa của các đạo diễn thời sinh viên!", en: "Pixar animators secretly hide the code 'A113' in almost all of their movies. It was the classroom number where they learned graphic design!", image: "https://images.unsplash.com/photo-1627856013091-fed6e4e30025?w=800" },
            { id: 52, vi: "Trong phim Iron Man 1, bộ giáp đầu tiên của Tony Stark được thiết kế rắc rối đến mức đoàn làm phim phải lắp ráp thủ công từ hơn 450 mảnh ghép riêng biệt! Đúng là siêu phẩm công nghệ từ đời thực bước lên màn ảnh.", en: "In the first Iron Man movie, Tony Stark's physical armor suit was composed of over 450 individual pieces for the actor to wear!", image: "https://images.unsplash.com/photo-1608889174637-3c99800e1791?w=800" },
            { id: 53, vi: "Nữ văn sĩ J.K. Rowling từng bị từ chối bởi tận 12 nhà xuất bản khác nhau khi bà mang bản thảo tập đầu tiên của 'Harry Potter' đi nộp. Giờ đây, loạt truyện này đã trở thành một trong những thương hiệu đắt giá nhất hành tinh!", en: "J.K. Rowling's original Harry Potter manuscript was rejected by 12 different publishers before finally getting accepted!", image: "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=800" },
            { id: 54, vi: "Loạt phim đình đám 'Trò chơi vương quyền' (Game of Thrones) đã sử dụng một lượng thịt nhân tạo và hơn 15.000 lít máu giả chỉ để phục vụ cho các cảnh quay chiến đấu hoành tráng trong suốt các mùa phim!", en: "The hit TV series Game of Thrones used over 15,000 liters of fake blood to film its epic and brutal battle scenes throughout the seasons!", image: "https://images.unsplash.com/photo-1578301978693-85fa9c0320b9?w=800" },
            { id: 55, vi: "Mạng xã hội Instagram ban đầu khi mới ra mắt vào năm 2010 có tên gọi gốc là 'Burbn' và nó là một ứng dụng tập trung vào việc check-in địa điểm uống rượu chứ không phải để đăng ảnh sống ảo như bây giờ đâu!", en: "Instagram was originally launched in 2010 as a location-based check-in app for whiskey lovers called 'Burbn'!", image: "https://images.unsplash.com/photo-1611262588024-d12430b98920?w=800" },
            { id: 56, vi: "Từ khóa được tìm kiếm nhiều nhất lịch sử mạng internet không phải là một ngôi sao showbiz nào cả, mà chính là từ 'Google'! Người ta mở trình duyệt lên và gõ 'Google' để vào... tìm kiếm Google. Nghe có lú không cơ chứ?", en: "The most searched word on Bing is ironically 'Google'. People literally use one search engine to look for another!", image: "https://images.unsplash.com/photo-1541535650810-10d26f5c2ab3?w=800" },
            { id: 57, vi: "Đạo diễn huyền thoại Alfred Hitchcock nổi tiếng là người đi tiên phong trong thể loại phim kinh dị giật gân, nhưng ngoài đời ông lại mắc một chứng sợ cực kỳ kỳ lạ và hài hước: Chứng sợ... những quả trứng gà!", en: "The legendary suspense director Alfred Hitchcock had a bizarre, lifelong phobia: he was absolutely terrified of eggs!", image: "https://images.unsplash.com/photo-1587486913049-53fc88980cfc?w=800" },
            { id: 58, vi: "Mạng xã hội Twitter (bây giờ là X) ban đầu sở hữu một logo chú chim xanh cực kỳ nổi tiếng. Ít ai biết chú chim đó được đặt tên chính thức là 'Larry', lấy cảm hứng từ cầu thủ bóng rổ huyền thoại Larry Bird!", en: "Twitter's iconic blue bird logo actually had an official name: 'Larry', named after the basketball legend Larry Bird!", image: "https://images.unsplash.com/photo-1611605698335-8b15d27e0397?w=800" },
            { id: 59, vi: "Bộ phim hoạt hình huyền thoại 'The Lion King' (Vua Sư Tử) ban đầu suýt chút nữa đã được đặt một cái tên nghe rất 'kiếm hiệp' là: 'King of the Jungle' (Vua của rừng rậm), cho đến khi họ nhận ra sư tử không hề sống trong rừng rậm!", en: "The Lion King was originally going to be titled 'King of the Jungle', until Disney realized that lions don't actually live in jungles!", image: "https://images.unsplash.com/photo-1602491453977-63a33a5552b9?w=800" },
            { id: 60, vi: "Để tạo ra tiếng động chân thực cho những bước đi của quái vật ngoài hành tinh trong phim 'Alien', chuyên gia âm thanh đã phải dùng tay bóp mạnh... những cây xà lách tươi và bánh pudding để thu âm!", en: "To create the wet, creepy sound effects of the Alien creature, sound designers used cracking celery and squishing pudding!", image: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=800" },
            { id: 61, vi: "Ca khúc hit toàn cầu 'Shape of You' của Ed Sheeran ban đầu được anh viết ra để dành tặng cho nữ ca sĩ Rihanna. Tuy nhiên sau đó anh giữ lại cho mình và bài hát đã bùng nổ thành một trong những đĩa đơn bán chạy nhất lịch sử!", en: "Ed Sheeran originally wrote the global hit song 'Shape of You' with pop star Rihanna in mind before deciding to keep it for himself.", image: "https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=800" },
            { id: 62, vi: "Bài hát bất hủ 'Happy Birthday' từng thuộc quyền sở hữu bản quyền của công ty Warner Chappell Music. Mãi cho đến tận năm 2016, tòa án mới chính thức phán quyết bài hát này thuộc về công chúng và hoàn toàn miễn phí!", en: "The 'Happy Birthday' song was copyrighted until 2016, meaning it was technically illegal to sing it in public movies without paying royalties!", image: "https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800" },
            { id: 63, vi: "Trong phim 'The Matrix' (Ma trận), đoạn mã chữ màu xanh lá cây đổ xuống màn hình máy tính huyền thoại thực chất được lấy từ... các công thức nấu món sushi Nhật Bản trong một cuốn sách nấu ăn của vợ đạo diễn!", en: "The famous green code falling down the screen in The Matrix was actually scanned from a Japanese sushi cookbook!", image: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=800" },
            { id: 64, vi: "Đoạn video dài nhất đang được phát trực tuyến trên YouTube hiện tại là một bản nhạc chill lofi dài tới hàng vạn giờ liên tục. Nó đã chạy ròng rã suốt nhiều năm trời mà không hề ngắt kết nối một giây nào!", en: "The longest continuous live stream in YouTube history ran for over thousands of hours before an accidental internet drop cut it off!", image: "https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=800" },
            { id: 65, vi: "Huyền thoại võ thuật Lý Tiểu Long có tốc độ ra đòn nhanh đến mức kinh hoàng. Khi quay phim vào những năm 1960, các camera thời đó không bắt kịp chuyển động của ông, buộc đạo diễn phải yêu cầu ông... đánh chậm lại!", en: "Bruce Lee's movements were so fast that film directors had to slow the footage down so audiences could actually see his strikes!", image: "https://images.unsplash.com/photo-1555597673-b21d5c935865?w=800" },
            { id: 66, vi: "Rapper nổi tiếng Eminem từng lập kỷ lục thế giới Guinness với bài hát 'Rap God'. Trong ca khúc này, anh đã bắn liên thanh tổng cộng 1.560 từ chỉ trong vòng 6 phút 4 giây! Đúng là cái lưỡi không xương!", en: "Eminem set a Guinness World Record with 'Rap God' for packing 1,560 words into a 6-minute, 4-second song. Peak verbal speed!", image: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800" },
            { id: 67, vi: "Khi bộ phim bom tấn 'Star Wars' (Chiến tranh giữa các vì sao) ra mắt tập đầu tiên vào năm 1977, không ai nghĩ nó sẽ thành công. Đạo diễn George Lucas thậm chí đã trốn đi du lịch vì quá lo sợ phim sẽ bị lỗ nặng!", en: "When Star Wars first premiered in 1977, director George Lucas was so sure it would flop that he went on vacation to avoid the news!", image: "https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=800" },
            { id: 68, vi: "Nữ ca sĩ Billie Eilish là nghệ sĩ đầu tiên sinh ra trong thế kỷ 21 giành được cả giải thưởng danh giá Oscar lẫn giải Grammy cao quý khi còn ở độ tuổi teen! Một tài năng kiệt xuất của âm nhạc hiện đại.", en: "Billie Eilish became the first artist born in the 21st century to win an Academy Award and multiple Grammy awards while still a teen!", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800" },

            { id: 71, vi: "Món khoai tây chiên McDonald's nổi tiếng thế giới thực chất chứa tới... 19 thành phần nguyên liệu khác nhau chứ không chỉ đơn giản là khoai tây và muối như chúng ta vẫn nghĩ! Bạn có bất ngờ trước sự thật rắc rối này không?", en: "World-famous McDonald's fries actually contain 19 different ingredients, not just potatoes and salt! Surprising, isn't it?", image: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=800" },
            { id: 72, vi: "Hệ thống định vị toàn cầu GPS mà bạn dùng để xem bản đồ mỗi ngày thực ra hoàn toàn miễn phí cho toàn bộ nhân loại, nhưng nó ngốn tới khoảng 2 triệu USD mỗi ngày của chính phủ Mỹ để duy trì hoạt động. Thật sự quá vĩ đại!", en: "The GPS system is entirely free for global civilian use, but costs the US government about $2 million daily to maintain. Incredible, right?", image: "https://images.unsplash.com/photo-1524661135-423995f22d0b?w=800" },

function convertToSlug(text) {
    return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[đĐ]/g, 'd')
        .replace(/([^a-z0-9\s- ]+)/g, '')
        .replace(/[\s-]+/g, '-')
        .trim();
}

function optimizeDataForSEO(originalList) {
    return originalList.map(item => {
        // Lấy 8 từ đầu làm tiêu đề cho ngắn gọn
        const shortText = item.vi.split(' ').slice(0, 8).join(' ');
        const generatedSlug = `${convertToSlug(shortText)}-${item.id}`;
        const generatedDesc = item.vi.length > 145 ? item.vi.substring(0, 142) + '...' : item.vi;

        return {
            ...item,
            slug: generatedSlug,
            meta_title: `${shortText}... - Sự thật số ${item.id}`,
            meta_description: generatedDesc
        };
    });
}

// Chuyển đổi mảng cũ thành mảng mới đầy đủ thuộc tính SEO
const seoDataStorage = optimizeDataForSEO(dataStorage);
        let currentFact = null;
        let currentLang = 'vi';
        let factHistory = []; 

        function getRandomFact() {
            if (!seoDataStorage || seoDataStorage.length === 0) return;
            if (factHistory.length === seoDataStorage.length) factHistory = []; 
            let randomIndex;
            let attempts = 0;
            do {
                randomIndex = Math.floor(Math.random() * seoDataStorage.length);
                attempts++;
            } while (factHistory.includes(randomIndex) && attempts < 100);
            factHistory.push(randomIndex);
            currentFact = dataStorage[randomIndex];
            currentLang = 'vi'; 
            updateUI();
        }
        function handleNextClick() { playBeep('pop'); getRandomFact(); }
        function updateUI() {
            if (!currentFact) return;
            if (currentLang === 'vi') {
                document.getElementById("title-text").innerText = "Bạn có biết?";
                document.getElementById("fact-text").innerText = currentFact.vi;
                document.querySelector(".lang-btn").innerText = "🇬🇧 Translate";
            } else {
                document.getElementById("title-text").innerText = "Did you know?";
                document.getElementById("fact-text").innerText = currentFact.en;
                document.querySelector(".lang-btn").innerText = "🇻🇳 Tiếng Việt";
            }
            if (currentFact.image) document.getElementById("bg-image").style.backgroundImage = `url('${currentFact.image}')`;
            const savedLikes = JSON.parse(localStorage.getItem('likedFacts')) || [];
            const heartBtn = document.getElementById("heart-icon");
            if (savedLikes.includes(currentFact.id)) heartBtn.classList.add("liked"); else heartBtn.classList.remove("liked");
        }
        function toggleLanguage() { playBeep('ting'); currentLang = (currentLang === 'vi') ? 'en' : 'vi'; updateUI(); }
        function toggleLike() {
            if (!currentFact) return;
            playBeep('like');
            let savedLikes = JSON.parse(localStorage.getItem('likedFacts')) || [];
            const heartBtn = document.getElementById("heart-icon");
            if (savedLikes.includes(currentFact.id)) {
                savedLikes = savedLikes.filter(id => id !== currentFact.id);
                heartBtn.classList.remove("liked");
            } else {
                savedLikes.push(currentFact.id);
                heartBtn.classList.add("liked");
            }
            localStorage.setItem('likedFacts', JSON.stringify(savedLikes));
        }
    </script>
