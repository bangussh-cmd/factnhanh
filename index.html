<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactNhanh - Sự Thật Song Ngữ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 0.5s ease-in-out; z-index: 1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55); z-index: 2;
        }

        .container {
            position: relative; z-index: 3; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
        }

        .fact-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 25px 35px 25px; border-radius: 24px;
            max-width: 600px; width: 100%; color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px; position: relative;
        }

        .fact-box h2 {
            font-size: 1.3rem; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 2px; color: #ffd700;
        }

        .fact-box p { font-size: 1.15rem; line-height: 1.6; min-height: 130px; display: flex; align-items: center; justify-content: center; }

        .action-header {
            position: absolute; top: 15px; right: 20px;
            display: flex; gap: 10px; align-items: center;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 6px 12px; font-size: 0.85rem;
            border-radius: 20px; cursor: pointer; transition: 0.2s;
        }
        .lang-btn:hover { background: rgba(255, 255, 255, 0.4); }

        .heart-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; width: 32px; height: 32px; font-size: 1rem;
            border-radius: 50%; cursor: pointer; transition: transform 0.2s, background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .heart-btn.liked {
            background: rgba(233, 30, 99, 0.2); border-color: #e91e63; color: #ff4081; transform: scale(1.1);
        }
        .heart-btn:active { transform: scale(0.9); }

        .next-btn {
            background: #00bcd4; color: white; border: none;
            padding: 16px 40px; font-size: 1.1rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 188, 212, 0.4);
            transition: transform 0.2s, background 0.2s;
        }
        .next-btn:hover { background: #00acc1; transform: scale(1.05); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px #ffd700; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <!-- Màn hình chào mừng thế hệ mới chuyên nghiệp -->
    <div id="audio-unlock-overlay" style="
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #111e25 0%, #081015 100%); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; text-align: center; padding: 20px;">
        
        <div style="font-size: 4rem; margin-bottom: 10px; animation: pulse 2s infinite;">💡</div>
        <h1 style="font-size: 1.8rem; font-weight: bold; letter-spacing: 1px; color: #ffd700;">FactNhanh</h1>
        <p style="margin-top: 10px; font-size: 1rem; color: #a0aec0; max-width: 300px; line-height: 1.5;">
            Khám phá kho tàng sự thật thú vị, "hơi độc lạ" được kể bằng phong cách cực cuốn!
        </p>
        
        <button onclick="startApp()" style="
            background: linear-gradient(90deg, #00bcd4, #00acc1); color: white; border: none; 
            padding: 16px 45px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; margin-top: 30px; box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4); 
            transition: transform 0.2s, box-shadow 0.2s;">
            Bắt đầu khám phá →
        </button>
    </div>

    <div id="bg-image"></div>
    <div class="overlay"></div>

    <div class="container">
        <div class="fact-box">
            <div class="action-header">
                <button id="heart-icon" class="heart-btn" onclick="toggleLike()">♥</button>
                <button class="lang-btn" onclick="toggleLanguage()">🇬🇧 Translate</button>
            </div>
            <h2 id="title-text">Bạn có biết?</h2>
            <p id="fact-text">Đang tải...</p>
        </div>
        <button class="next-btn" onclick="handleNextClick()">Câu chuyện tiếp theo →</button>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return false;
                
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return true;
            } catch (e) {
                console.log("Audio bị trình duyệt chặn:", e);
                return false;
            }
        }

        function startApp() {
            document.getElementById('audio-unlock-overlay').style.display = 'none';
            getRandomFact();

            try {
                if (initAudio()) {
                    setTimeout(() => { playBeep('ting'); }, 100);
                }
            } catch (e) {}
        }

        function playBeep(type) {
            try {
                if (!initAudio() || !audioCtx) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                    gain.gain.setValueAtTime(0.6, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'ting') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.1);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else if (type === 'like') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.setValueAtTime(800, now + 0.06);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                }
            } catch (e) {}
        }

        // Kho nội dung mới cực mặn và cuốn hút theo ý tưởng của bạn
        const dataStorage = [
            { id: 1, vi: "Kỷ lục chạy 100m thế giới thuộc về Usain Bolt với 9,58 giây. Nghĩa là cứ mỗi lần bạn chớp mắt một cái, anh ấy đã phóng đi được hơn 10 mét rồi. Quá khủng khiếp phải không?", en: "Usain Bolt's 100m world record is 9.58 seconds. This means every time you blink once, he has already sprinted over 10 meters! Mind-blowing, isn't it?", image: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=800" },
            { id: 2, vi: "Trong suốt cuộc đời, một người đàn ông khỏe mạnh sản sinh ra lượng tinh dịch đủ để lấp đầy 3 hồ chứa lớn dung tích 100 mét khối mỗi hồ! Bạn có bất ngờ về con số khổng lồ này không?", en: "Throughout his life, a healthy man produces enough semen to fill 3 large reservoirs of 100 cubic meters each! Are you surprised by this massive number?", image: "https://images.unsplash.com/photo-1576086213369-97a306d36557?w=800" },
            { id: 3, vi: "Tài sản của Elon Musk lớn tới mức nếu bạn quy đổi ra các tờ tiền 500k Việt Nam đồng và ngồi đốt liên tục không ngừng nghỉ, bạn phải mất tới hơn 100 năm mới có thể đốt hết sạch đấy!", en: "Elon Musk's wealth is so immense that if you converted it into Vietnam's 500k VND bills and burned them continuously, it would take you over 100 years to burn it all!", image: "https://images.unsplash.com/photo-1617791160505-6f006e121980?w=800" },
            { id: 4, vi: "Bạn có biết nước ép dứa chứa enzyme bromelain chuyên phân hủy protein? Về cơ bản, khi bạn đang nhai dứa ngon lành thì quả dứa cũng đang tìm cách 'ăn thịt' ngược lại khoang miệng của bạn đó!", en: "Did you know pineapple juice contains bromelain, an enzyme that breaks down proteins? Basically, while you are enjoying eating a pineapple, it is technically trying to 'eat' you back!", image: "https://images.unsplash.com/photo-1550258987-190a2d41a8ba?w=800" },
            { id: 5, vi: "Ốc sên là bậc thầy ngủ nướng! Nếu thời tiết quá khô hạn hoặc khắc nghiệt, chúng có thể đi ngủ một mạch liên tục suốt 3 năm trời mà không cần ăn uống gì. Có ai muốn có siêu năng lực này không?", en: "Snails are the ultimate sleep masters! If the weather is too dry, they can literally go to sleep for 3 straight years without eating. Anyone wants this superpower?", image: "https://images.unsplash.com/photo-1533105079780-92b9be482077?w=800" },
            { id: 6, vi: "Loài sứa bất tử (Turritopsis dohrnii) không bao giờ chết già. Khi gặp nguy hiểm hoặc già đi, chúng tự quay ngược vòng đời trở lại thành một em bé sơ sinh. Đúng là cải lão hoàn đồng ngoài đời thực!", en: "The immortal jellyfish never dies of old age. When threatened, it reverses its life cycle back to a newborn polyp state. Real-life reverse aging is real!", image: "https://images.unsplash.com/photo-1564419320461-6870880221ad?w=800" },
            { id: 7, vi: "Nếu đem cân một đám mây tích điện màu trắng bồng bềnh mà bạn hay nhìn thấy trên trời, trọng lượng của nó tương đương với khoảng 100 con voi trưởng thành gộp lại! Bạn thấy nó còn nhẹ nhàng nữa không?", en: "An average fluffy white cumulus cloud weighs about the same as 100 fully-grown elephants combined! Do you still think it looks light and airy?", image: "https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?w=800" },
            { id: 8, vi: "Áp suất khí quyển trên sao Mộc lớn kinh hoàng đến mức nó có thể ép chặt carbon trong không khí lại và tạo ra những cơn mưa... bằng kim cương thật 100%. Bạn có muốn lên đó nhặt vài viên không?", en: "The atmospheric pressure on Jupiter is so intense that it crushes carbon in the air, causing it to literally rain 100% real diamonds. Want to go there and grab some?", image: "https://images.unsplash.com/photo-1614314107204-b816223b33a7?w=800" },
            { id: 9, vi: "Mật ong trong lăng mộ Ai Cập cổ đại đã trải qua 3.000 năm tuổi nhưng khi các nhà khảo cổ nếm thử thì nó vẫn thơm ngon hoàn hảo! Đây là thực phẩm duy nhất trên Trái Đất không bao giờ bị thiu hỏng.", en: "Honey found in ancient Egyptian tombs is over 3,000 years old, but it is still perfectly edible! It is the only food on Earth that never spoils.", image: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=800" },
            { id: 10, vi: "Bạch tuộc là sinh vật cực dị khi sở hữu tới 3 trái tim, 9 bộ não và dòng máu chảy trong người chúng có màu xanh lam quý tộc chứ không phải màu đỏ giống như chúng ta đâu nhé!", en: "Octopuses are incredibly bizarre: they have 3 hearts, 9 brains, and their blood is a royal light blue color instead of red like ours!", image: "https://images.unsplash.com/photo-1545671913-b89ac1b4ac10?w=800" }
        ];

        let currentFact = null;
        let currentLang = 'vi';
        let factHistory = []; 

        function getRandomFact() {
            if (!dataStorage || dataStorage.length === 0) return;
            
            if (factHistory.length === dataStorage.length) {
                factHistory = []; 
            }

            let randomIndex;
            let attempts = 0;
            do {
                randomIndex = Math.floor(Math.random() * dataStorage.length);
                attempts++;
            } while (factHistory.includes(randomIndex) && attempts < 100);

            factHistory.push(randomIndex);
            currentFact = dataStorage[randomIndex];
            currentLang = 'vi'; 
            updateUI();
        }

        function handleNextClick() {
            playBeep('pop');
            getRandomFact();
        }

        function updateUI() {
            if (!currentFact) return;
            
            if (currentLang === 'vi') {
                document.getElementById("title-text").innerText = "Bạn có biết?";
                document.getElementById("fact-text").innerText = currentFact.vi;
                document.querySelector(".lang-btn").innerText = "🇬🇧 Translate";
            } else {
                document.getElementById("title-text").innerText = "Did you know?";
                document.getElementById("fact-text").innerText = currentFact.en;
                document.querySelector(".lang-btn").innerText = "🇻🇳 Tiếng Việt";
            }
            
            if (currentFact.image) {
                document.getElementById("bg-image").style.backgroundImage = `url('${currentFact.image}')`;
            }

            const savedLikes = JSON.parse(localStorage.getItem('likedFacts')) || [];
            const heartBtn = document.getElementById("heart-icon");
            if (savedLikes.includes(currentFact.id)) {
                heartBtn.classList.add("liked");
            } else {
                heartBtn.classList.remove("liked");
            }
        }

        function toggleLanguage() {
            playBeep('ting');
            currentLang = (currentLang === 'vi') ? 'en' : 'vi';
            updateUI();
        }

        function toggleLike() {
            if (!currentFact) return;
            
            playBeep('like');

            let savedLikes = JSON.parse(localStorage.getItem('likedFacts')) || [];
            const heartBtn = document.getElementById("heart-icon");

            if (savedLikes.includes(currentFact.id)) {
                savedLikes = savedLikes.filter(id => id !== currentFact.id);
                heartBtn.classList.remove("liked");
            } else {
                savedLikes.push(currentFact.id);
                heartBtn.classList.add("liked");
            }

            localStorage.setItem('likedFacts', JSON.stringify(savedLikes));
        }
    </script>
</body>
</html>
